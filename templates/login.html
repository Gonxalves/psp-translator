{% extends "base.html" %}

{% block body %}
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f9fafb;">
    <div style="background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.08);width:100%;max-width:400px;text-align:center;">
        <h1 style="margin-bottom:24px;color:#1f2937;">PSP Translator</h1>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <div style="text-align:left;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px;">Password</div>
            <input type="password" name="password" autofocus required placeholder="Enter password..."
                   style="width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;margin-bottom:12px;">
            <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>
    </div>
</div>
{% endblock %}
